<script>
// 비밀번호 확인 (해시 비교 - 원문 노출 최소화)
const PW_HASH = '3e175354621d9ab8c1785874c6e67b639b84bbe8f01906d8967b9370d47f7c49';
async function sha256(msg){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkPassword(){
  const val = document.getElementById('pw-input').value;
  const hash = await sha256(val);
  if(hash === PW_HASH){
    document.getElementById('pw-gate').style.display = 'none';
    sessionStorage.setItem('seoul_map_auth','1');
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
}
// 세션 내 재방문 시 자동 통과
if(sessionStorage.getItem('seoul_map_auth') === '1'){
  document.addEventListener('DOMContentLoaded', ()=>{
    document.getElementById('pw-gate').style.display = 'none';
  });
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script>
// ── 좌표계 정의 (EPSG:5179 한국 TM → WGS84) ──────────────────
proj4.defs("EPSG:5179","+proj=tmerc +lat_0=38 +lon_0=127.5 +k=0.9996 +x_0=1000000 +y_0=2000000 +ellps=GRS80 +units=m +no_defs");

function convertGeometry(geom){
  const convPoint = p => {
    const [x, y] = p.map(Number);
    const [lng, lat] = proj4("EPSG:5179", "EPSG:4326", [x, y]);
    return [lng, lat];
  };
  const convRing = r => r.map(convPoint);
  const convPoly = p => p.map(convRing);
  const convMulti = m => m.map(convPoly);
  const g = {type: geom.type};
  if(geom.type === 'Polygon')           g.coordinates = convPoly(geom.coordinates);
  else if(geom.type === 'MultiPolygon') g.coordinates = convMulti(geom.coordinates);
  else g.coordinates = geom.coordinates;
  return g;
}

// ── SGIS API ────────────────────────────────────────────────
const SGIS_KEY    = 'cc73e4109b6d4ff49536';
const SGIS_SECRET = '3edc45404c8848569095';
let sgisToken = null, tokenExpiry = 0;

async function getSgisToken(force = false){
  // force=true 이거나 토큰 없거나 만료됐으면 새로 발급
  if(!force && sgisToken && Date.now() < tokenExpiry) return sgisToken;
  sgisToken = null;
  const url = `https://sgisapi.mods.go.kr/OpenAPI3/auth/authentication.json?consumer_key=${SGIS_KEY}&consumer_secret=${SGIS_SECRET}`;
  const res = await fetch(url);
  const data = await res.json();
  if(data.errCd !== 0) throw new Error('SGIS 인증 실패: '+data.errMsg);
  sgisToken = data.result.accessToken;
  // accessTimeout은 Unix timestamp(초)이므로 *1000 해서 ms로 변환, 5분 여유
  tokenExpiry = Number(data.result.accessTimeout) * 1000 - 5 * 60 * 1000;
  // 만약 여전히 과거라면 현재+55분으로 설정
  if(tokenExpiry < Date.now()) tokenExpiry = Date.now() + 55 * 60 * 1000;
  return sgisToken;
}

let SGIS_GU_CODES = null;
async function fetchSgisGuCodes(retry = false){
  if(SGIS_GU_CODES && !retry) return SGIS_GU_CODES;
  const token = await getSgisToken(retry);
  const url = `https://sgisapi.mods.go.kr/OpenAPI3/boundary/hadmarea.geojson?accessToken=${token}&year=2022&adm_cd=11&low_search=1`;
  const res = await fetch(url);
  const data = await res.json();
  // 인증 오류면 토큰 초기화 후 1회 재시도
  if(data.errCd === -401 && !retry){
    sgisToken = null; SGIS_GU_CODES = null;
    return fetchSgisGuCodes(true);
  }
  if(data.errCd !== 0) throw new Error('SGIS 구 코드 조회 실패: '+data.errMsg);
  SGIS_GU_CODES = {};
  data.features.forEach(f => {
    const guName = (f.properties.adm_nm || '').split(' ').pop();
    if(guName && f.properties.adm_cd) SGIS_GU_CODES[guName] = f.properties.adm_cd;
  });
  return SGIS_GU_CODES;
}

// ── 타일 ────────────────────────────────────────────────────
const TILES = {
  light:    {url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', attr:'© CARTO'},
  dark:     {url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',  attr:'© CARTO'},

// ── 상태 ────────────────────────────────────────────────────
const guLayers = {}, guVisible = {};
const guLabelLayers = {};
const dongState = {};
const subwayGroups = {}, subwayVisible = {};

function setLoading(msg){
  const el = document.getElementById('loading');
  if(msg){ document.getElementById('loading-msg').textContent = msg; el.classList.remove('hide'); }
  else el.classList.add('hide');

// ── 구 GeoJSON 로드 ─────────────────────────────────────────
const GU_URL = 'https://raw.githubusercontent.com/southkorea/seoul-maps/master/kostat/2013/json/seoul_municipalities_geo_simple.json';

async function loadGu(){
  setLoading('구 경계 로딩 중…');
  const r = await fetch(GU_URL);
  const data = await r.json();
  data.features.forEach(f => {
    const name = f.properties.name || f.properties.NAME;
    if(!name) return;
    const layer = L.geoJSON(f, {style: ()=>({...styles().gu})})
      .bindPopup(`<b style="font-size:13px">${name}</b>`, {closeButton:false});
    layer.on('mouseover', function(e){ e.target.setStyle(styles().guHov); this.openPopup(); });
    layer.on('mouseout',  function(e){ e.target.setStyle(styles().gu);    this.closePopup(); });
    layer.addTo(map);
    guLayers[name] = layer;
    guVisible[name] = true;
    dongState[name] = {dongMap:{}, loaded:false, loading:false};

    // 구 중심에 이름 라벨 표시 (폴리곤 무게중심 계산)
    const center = getPolygonCentroid(f);
    const label = L.marker(center, {
      icon: L.divIcon({
        className: '',
        html: `<div class="gu-label" data-gu="${name}">${name}</div>`,
        iconSize: [80, 20],
        iconAnchor: [40, 10]
      }),
      interactive: false,
      zIndexOffset: -100
    });
    label.addTo(map);
    guLabelLayers[name] = label;
  });
}

// ── 폴리곤 무게중심(centroid) 계산 ──────────────────────────
// GeoJSON feature에서 가장 큰 폴리곤의 무게중심을 반환
function getPolygonCentroid(feature){
  const geom = feature.geometry;
  let rings = [];
  if(geom.type === 'Polygon') rings = [geom.coordinates[0]];
  else if(geom.type === 'MultiPolygon'){
    // 가장 큰 폴리곤 선택
    let maxArea = 0, best = null;
    geom.coordinates.forEach(poly => {
      const area = polygonArea(poly[0]);
      if(area > maxArea){ maxArea = area; best = poly[0]; }
    });
    rings = best ? [best] : [];
  }
  if(!rings.length) return L.latLng(37.5665, 126.978);
  const pts = rings[0];
  let cx=0, cy=0, area=0;
  for(let i=0, j=pts.length-1; i<pts.length; j=i++){
    const [x1,y1]=pts[j], [x2,y2]=pts[i];
    const a = x1*y2 - x2*y1;
    area += a;
    cx += (x1+x2)*a;
    cy += (y1+y2)*a;
  }
  area /= 2;
  cx /= (6*area);
  cy /= (6*area);
  return L.latLng(cy, cx); // GeoJSON은 [lng, lat]이므로 swap
}
function polygonArea(pts){
  let a=0;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    a += pts[j][0]*pts[i][1] - pts[i][0]*pts[j][1];
  }
  return Math.abs(a/2);
}

// ── 동 라벨 레이어 ────────────────────────────────────────────
const dongLabelLayers = {};

function addDongLabel(guName, dongName, feature){
  const center = getPolygonCentroid(feature);
  const label = L.marker(center, {
    icon: L.divIcon({
      className: '',
      html: `<div class="dong-label">${dongName}</div>`,
      iconSize: [70, 16],
      iconAnchor: [35, 8]
    }),
    interactive: false,
    zIndexOffset: -50
  });
  const key = `${guName}__${dongName}`;
  dongLabelLayers[key] = label;
  return label;
}


async function loadDongForGu(guName, retry = false){
  const state = dongState[guName];
  if(!state || state.loading) return;
  if(state.loaded && !retry) return;
  state.loading = true;
  const listEl = document.getElementById(`dl-${guName}`);
  if(listEl) listEl.innerHTML = `<div class="dong-loading">동 경계 불러오는 중…</div>`;
  try{
    const guCodes = await fetchSgisGuCodes(retry);
    const guCd = guCodes[guName];
    if(!guCd) throw new Error(`SGIS에서 '${guName}' 코드 없음`);
    const token = await getSgisToken(retry);
    const url = `https://sgisapi.mods.go.kr/OpenAPI3/boundary/hadmarea.geojson?accessToken=${token}&year=2022&adm_cd=${guCd}&low_search=1`;
    const res = await fetch(url);
    const geojson = await res.json();
    // 인증 오류 시 1회 재시도
    if(geojson.errCd === -401 && !retry){
      sgisToken = null; SGIS_GU_CODES = null; state.loading = false; state.loaded = false;
      return loadDongForGu(guName, true);
    }
    if(geojson.errCd !== 0) throw new Error('SGIS: '+geojson.errMsg);
    if(!geojson.features?.length) throw new Error('동 데이터 없음');

    if(listEl) listEl.innerHTML = '';
    // 기존 레이어 제거
    Object.values(state.dongMap).forEach(l => { try{ map.removeLayer(l); }catch(e){} });
    state.dongMap = {};
    const dongStyle = styles().dong;

    geojson.features.forEach(f => {
      const dongName = (f.properties.adm_nm || '').split(' ').pop();
      if(!dongName) return;
      const convertedGeom = convertGeometry(f.geometry);
      const convertedFeature = {type:'Feature', properties:f.properties, geometry:convertedGeom};

      const layer = L.geoJSON(convertedFeature, {style: ()=>({...dongStyle})})
        .bindPopup(`<div style="font-size:13px"><b>${dongName}</b><br><span style="font-size:11px;color:#888">${guName}</span></div>`, {closeButton:false});
      layer.on('mouseover', function(e){ e.target.setStyle(styles().dongHov); this.openPopup(); });
      layer.on('mouseout',  function(e){ e.target.setStyle(styles().dong);    this.closePopup(); });
      state.dongMap[dongName] = layer;

      // 동 라벨 생성 (원본 GeoJSON feature 좌표 변환 후 무게중심)
      addDongLabel(guName, dongName, convertedFeature);

      if(listEl){
        const dRow = document.createElement('div');
        dRow.className = 'dong-row';
        dRow.id = `dr-${guName}__${dongName}`;
        dRow.innerHTML = `<span class="dong-name">${dongName}</span><input class="dong-cb" type="checkbox" data-gu="${guName}" data-dong="${dongName}">`;
        dRow.querySelector('input').addEventListener('change', e => {
          const on = e.target.checked;
          const lkey = `${guName}__${dongName}`;
          if(on){
            map.addLayer(state.dongMap[dongName]);
            if(dongLabelLayers[lkey]) map.addLayer(dongLabelLayers[lkey]);
          } else {
            map.removeLayer(state.dongMap[dongName]);
            if(dongLabelLayers[lkey]) try{ map.removeLayer(dongLabelLayers[lkey]); }catch(e){}
          }
          dRow.classList.toggle('dim', !on);
        });
        listEl.appendChild(dRow);
      }
    });
    state.loaded = true;
    buildSearchIndex();
  }catch(err){
    console.error('동 로드 ('+guName+'):', err);
    if(listEl){
      const retryBtn = `<button onclick="dongState['${guName}'].loaded=false;dongState['${guName}'].loading=false;loadDongForGu('${guName}',true)" style="margin-top:4px;font-size:10px;padding:2px 6px;cursor:pointer;border:0.5px solid #ccc;border-radius:3px;background:#fff">재시도</button>`;
      listEl.innerHTML = `<div class="dong-error">⚠ ${err.message}${retryBtn}</div>`;
    }
    if(err.message.includes('인증') || err.message.includes('401')) { sgisToken = null; SGIS_GU_CODES = null; }
  }
  state.loading = false;
}

// ── 사이드바 구 목록 ────────────────────────────────────────
function buildGuList(){
  const listEl = document.getElementById('gu-list');
  listEl.innerHTML = '';
  Object.keys(guLayers).sort().forEach(guName => {
    const block = document.createElement('div'); block.className='gu-block'; block.id=`gb-${guName}`;
    const guRow = document.createElement('div'); guRow.className='gu-row';
    guRow.innerHTML = `<span class="gu-chevron" id="chev-${guName}" title="동 목록">▶</span><span class="gu-name">${guName}</span><input class="gu-cb" type="checkbox" checked data-gu="${guName}">`;
    const chevron = guRow.querySelector('.gu-chevron');
    const cb = guRow.querySelector('.gu-cb');
    const dongListEl = document.createElement('div'); dongListEl.className='dong-list'; dongListEl.id=`dl-${guName}`;

    cb.addEventListener('change', e => {
      guVisible[guName] = e.target.checked;
      // 구 경계와 라벨만 토글 (동은 독립적으로 작동)
      e.target.checked ? map.addLayer(guLayers[guName]) : map.removeLayer(guLayers[guName]);
      if(guLabelLayers[guName]) e.target.checked ? map.addLayer(guLabelLayers[guName]) : map.removeLayer(guLabelLayers[guName]);
      guRow.classList.toggle('dim', !e.target.checked);
    });
    chevron.addEventListener('click', () => {
      const open = dongListEl.classList.toggle('open');
      chevron.classList.toggle('open', open);
      if(open) loadDongForGu(guName);
    });
    block.appendChild(guRow); block.appendChild(dongListEl);
    listEl.appendChild(block);
  });
}

function loadSubway(){
  const listEl = document.getElementById('line-list');
  Object.entries(SUBWAY).forEach(([lineName, line]) => {
    const g = L.layerGroup();
    const seen = new Set();
    line.segments.forEach(seg => {
      L.polyline(seg.map(s=>[s.lat, s.lng]), {color:line.color, weight:3.5, opacity:0.9}).addTo(g);
      seg.forEach(s => {
        const key = `${s.name}_${s.lat.toFixed(4)}_${s.lng.toFixed(4)}`;
        if(seen.has(key)) return;
        seen.add(key);
        L.circleMarker([s.lat, s.lng], {radius:3.5, fillColor:'#fff', color:line.color, weight:2, fillOpacity:1, opacity:1})
          .bindPopup(`<div style="font-size:13px;padding:2px"><b>${s.name}</b><br><span style="font-size:11px;color:#888">${lineName}</span></div>`, {closeButton:false})
          .on('mouseover', function(){ this.openPopup(); })
          .on('mouseout',  function(){ this.closePopup(); })
          .addTo(g);
      });
    });
    g.addTo(map);
    subwayGroups[lineName] = g;
    subwayVisible[lineName] = true;
    const div = document.createElement('div');
    div.className = 'line-row';
    div.id = `lr-${lineName}`;
    div.innerHTML = `<div class="line-swatch" style="background:${line.color}"></div><span class="line-name">${lineName}</span><input class="line-cb" type="checkbox" checked style="accent-color:${line.color}" data-line="${lineName}">`;
    div.querySelector('input').addEventListener('change', e => {
      const n = e.target.dataset.line;
      subwayVisible[n] = e.target.checked;
      e.target.checked ? map.addLayer(subwayGroups[n]) : map.removeLayer(subwayGroups[n]);
      div.classList.toggle('dim', !e.target.checked);
    });
    listEl.appendChild(div);
  });
}

// ── 탭 / 전체 토글 ──────────────────────────────────────────
function switchTab(id, btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}
function toggleAllDistrict(){
  const allOn = Object.values(guVisible).every(v=>v);
  Object.keys(guLayers).forEach(n => {
    guVisible[n] = !allOn;
    const cb = document.querySelector(`.gu-cb[data-gu="${n}"]`);
    if(cb) cb.checked = !allOn;
    const row = cb?.closest('.gu-row');
    if(row) row.classList.toggle('dim', allOn);
    // 전체 토글: 구 경계/라벨만 토글, 동은 독립 유지
    allOn ? map.removeLayer(guLayers[n]) : map.addLayer(guLayers[n]);
    if(guLabelLayers[n]) allOn ? map.removeLayer(guLabelLayers[n]) : map.addLayer(guLabelLayers[n]);
  });
}
function toggleAllSubway(){
  const allOn = Object.values(subwayVisible).every(v=>v);
  Object.keys(subwayGroups).forEach(n => {
    subwayVisible[n] = !allOn;
    const cb = document.querySelector(`.line-cb[data-line="${n}"]`);
    if(cb) cb.checked = !allOn;
    const row = document.getElementById(`lr-${n}`);
    if(row) row.classList.toggle('dim', allOn);
    allOn ? map.removeLayer(subwayGroups[n]) : map.addLayer(subwayGroups[n]);
  });
}

// ── 검색 ────────────────────────────────────────────────────
let searchItems = [];
function buildSearchIndex(){
  searchItems = [];
  Object.keys(guLayers).forEach(n => searchItems.push({type:'gu', label:n, key:n}));
  Object.keys(dongState).forEach(guName => {
    Object.keys(dongState[guName].dongMap).forEach(dong => {
      searchItems.push({type:'dong', label:dong, key:`${guName}__${dong}`, gu:guName});
    });
  });
  Object.keys(subwayGroups).forEach(n => searchItems.push({type:'line', label:n, key:n}));
}
function onSearch(q){
  document.getElementById('search-clear').style.display = q ? 'block' : 'none';
  if(!q){ hideDrop(); return; }
  const lq = q.toLowerCase();
  const results = searchItems.filter(i => i.label.includes(q) || i.label.toLowerCase().includes(lq)).slice(0, 25);
  const drop = document.getElementById('search-drop');
  if(!results.length){ drop.innerHTML = '<div class="drop-item" style="color:#ccc">결과 없음</div>'; drop.style.display='block'; return; }
  drop.innerHTML = results.map(r => {
    const tag = r.type==='gu' ? '<span class="drop-tag tag-gu">구</span>'
              : r.type==='dong' ? '<span class="drop-tag tag-dong">동</span>'
              : `<span class="drop-tag tag-line" style="background:${SUBWAY[r.key]?.color||'#888'}22;color:${SUBWAY[r.key]?.color||'#888'}">노선</span>`;
    const sub = r.type==='dong' ? `<span style="font-size:10px;color:#aaa">${r.gu}</span>` : '';
    return `<div class="drop-item" onclick="selectResult('${r.type}','${encodeURIComponent(r.key)}')">${tag}<span>${r.label}</span>${sub}</div>`;
  }).join('');
  drop.style.display = 'block';
}
async function selectResult(type, encKey){
  const key = decodeURIComponent(encKey);
  hideDrop(); clearSearch();
  if(type === 'gu'){
    if(!guVisible[key]){ guVisible[key]=true; map.addLayer(guLayers[key]); const cb=document.querySelector(`.gu-cb[data-gu="${key}"]`); if(cb)cb.checked=true; }
    map.fitBounds(guLayers[key].getBounds(), {padding:[40,40]});
    switchTab('district', document.querySelectorAll('.stab')[0]);
    document.getElementById(`gb-${key}`)?.scrollIntoView({behavior:'smooth', block:'center'});
  } else if(type === 'dong'){
    const [guName, dongName] = key.split('__');
    if(!dongState[guName]?.loaded) await loadDongForGu(guName);
    const layer = dongState[guName]?.dongMap[dongName];
    if(layer){
      map.addLayer(layer);
      map.fitBounds(layer.getBounds(), {padding:[60,60]});
      const cb = document.querySelector(`.dong-cb[data-gu="${guName}"][data-dong="${dongName}"]`);
      if(cb) cb.checked = true;
    }
    const dl = document.getElementById(`dl-${guName}`);
    if(dl && !dl.classList.contains('open')){ dl.classList.add('open'); document.getElementById(`chev-${guName}`)?.classList.add('open'); }
    switchTab('district', document.querySelectorAll('.stab')[0]);
    document.getElementById(`dr-${key}`)?.scrollIntoView({behavior:'smooth', block:'center'});
  } else {
    if(!subwayVisible[key]){ subwayVisible[key]=true; map.addLayer(subwayGroups[key]); const cb=document.querySelector(`.line-cb[data-line="${key}"]`); if(cb)cb.checked=true; }
    switchTab('subway', document.querySelectorAll('.stab')[1]);
    document.getElementById(`lr-${key}`)?.scrollIntoView({behavior:'smooth', block:'center'});
  }
}
function showDrop(){ if(document.getElementById('search-input').value) onSearch(document.getElementById('search-input').value); }
function hideDrop(){ document.getElementById('search-drop').style.display = 'none'; }
function clearSearch(){ document.getElementById('search-input').value=''; document.getElementById('search-clear').style.display='none'; hideDrop(); }

function loadRivers(){
  riverLayer = L.geoJSON(RIVERS_GEOJSON, {
    style: {
      color: '#3D8FC4',
      weight: 1,
      opacity: 0.7,
      fillColor: '#4FA8D8',

}
function toggleRivers(on){
  if(!riverLayer) return;

let forestLayer = null;
function loadForest(){
  forestLayer = L.geoJSON(FOREST_GEOJSON, {
    style: {
      color: '#4E8C43',
      weight: 0.6,
      opacity: 0.5,
      fillColor: '#6BAF5F',
      fillOpacity: 0.35,
      interactive: false
    },
    pane: 'tilePane'
  });
  forestLayer.addTo(map);
}
function toggleForest(on){
  if(!forestLayer) return;
  on ? map.addLayer(forestLayer) : map.removeLayer(forestLayer);
}

// ── 초기화 ──────────────────────────────────────────────────
(async ()=>{
  try{
    loadRivers();
    loadForest();
    loadSubway();
    await loadGu();
    buildGuList();
    buildSearchIndex();
    setLoading(null);
  }catch(e){
    console.error(e);
    setLoading('초기화 실패: '+e.message);
  }
})();
</script>
